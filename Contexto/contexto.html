<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Contexto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="represent">
        <img src="https://picsum.photos/id/1025/200/150" alt="Starter Image 1">
        <img src="https://picsum.photos/id/1062/200/150" alt="Starter Image 2">

    </div>
    
    <div class="picker-container">
        <div class="scroll-bar" id="imagePicker">
